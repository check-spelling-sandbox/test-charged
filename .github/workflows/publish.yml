name: Publish

on:
  pull_request:
    paths:
      - "src/*"
      - "project/*"
      - "*.sbt"
  push:
    paths:
      - "src/*"
      - "project/*"
      - "*.sbt"
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    permissions:
      contents: read
    strategy:
      matrix:
        java-version: [11, 17, 21]
        scala-version: ['2.12.x', '2.13.x', '3.x']
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'sbt'
          check-latest: true

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Build
        run: sbt "clean; reload; compile"

      - name: Test
        run: sbt ++${{ matrix.scala-version }} test

  maven-central:
    name: Maven Central
    needs: [test]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'repository_dispatch') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'
          check-latest: true

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Release
        shell: bash
        env:
          SONATYPE_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          PGP_SECRET: ${{ secrets.GPG_SIGNING_KEY }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          : Release
          (
            umask 0077
            mkdir -p ~/.gnupg/private-keys-v1.d
          )
          
          export GPG_TTY=$(tty)
          echo "$PGP_SECRET" | base64 -d | gpg --batch --allow-secret-key-import --import
          sbt "+publishSigned; sonatypeBundleRelease"
